name: Rebase onto `docs`

on:
  workflow_run:
    workflows: ["Build project"]
    types: [completed]
    branches: 
    - main

permissions:
  contents: read # Read access to repository contents

jobs:
  doc:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main 
        uses: actions/checkout@v6
        with:
          ref: docs 
          fetch-depth: 0

      - name: Rebase onto `docs` to trigger workflow
        id: rebase
        run: |
          git rebase main docs && exit 0 || exit 1

      - name: Push
        if: ${{ steps.rebase.outputs.result == 'success' }}
        run: git push --force-with-lease origin docs