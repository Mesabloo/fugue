name: Rebase onto `docs`

on:
  workflow_run:
    workflows: ["Build project"]
    types: [completed]
    branches: 
    - main

permissions:
  contents: write

jobs:
  doc:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main 
        uses: actions/checkout@v6
        with:
          ref: docs 
          fetch-depth: 0

      - name: Rebase onto `docs` to trigger workflow
        id: rebase
        run: |
          git fetch --all
          git checkout -B main origin/main
          git rebase main docs && exit 0 || exit 1

      - name: Make empty commit 
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m 'deploy docs'

      - name: Push
        run: |
          git push --force-with-lease origin docs